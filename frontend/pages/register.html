<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Bidmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto flex min-h-screen max-w-xl flex-col justify-center px-6">
      <a class="text-sm text-slate-400" href="/pages/login.html">Back to login</a>
      <h1 class="mt-4 text-3xl font-semibold">Register</h1>
      <p class="mt-2 text-sm text-slate-400">Buat akun buyer atau seller.</p>

      <form class="mt-8 space-y-4" id="register-form">
        <label class="flex flex-col gap-2 text-sm">
          Email
          <input
            class="rounded-lg border border-slate-800 bg-slate-900 px-4 py-2"
            type="email"
            name="email"
            required
          />
        </label>
        <label class="flex flex-col gap-2 text-sm">
          Password
          <input
            class="rounded-lg border border-slate-800 bg-slate-900 px-4 py-2"
            type="password"
            name="password"
            required
          />
        </label>
        <label class="flex flex-col gap-2 text-sm">
          Role
          <select class="rounded-lg border border-slate-800 bg-slate-900 px-4 py-2" name="role">
            <option value="BUYER">BUYER</option>
            <option value="SELLER">SELLER</option>
          </select>
        </label>
        <button class="w-full rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold" type="submit">
          Register
        </button>
        <p class="text-sm text-red-400" id="register-error"></p>
      </form>
    </main>
    <script type="module" src="/assets/js/auth.js"></script>
  </body>
</html>
