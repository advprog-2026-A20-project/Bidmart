<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Listing - Bidmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div id="navbar"></div>

    <main class="mx-auto flex min-h-screen max-w-5xl flex-col justify-center px-6 py-10">
      <div class="mx-auto w-full max-w-xl rounded-2xl bg-white p-8 text-slate-900 shadow-xl">
        <h1 class="text-3xl font-semibold">Create Listing</h1>
        <p class="mt-2 text-sm text-slate-500">Hanya seller yang bisa membuat listing.</p>

        <div class="mt-6 hidden rounded-xl border border-amber-200 bg-amber-50 p-4 text-sm text-amber-800" id="seller-warning"></div>

        <form class="mt-6 space-y-4" id="create-listing-form">
          <label class="flex flex-col gap-2 text-sm font-medium">
            Title
            <input
              class="input-field w-full rounded-lg border border-slate-200 bg-white px-4 py-2 text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-slate-100"
              type="text"
              name="title"
              required
            />
          </label>
          <label class="flex flex-col gap-2 text-sm font-medium">
            Description
            <textarea
              class="input-field w-full rounded-lg border border-slate-200 bg-white px-4 py-2 text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-slate-100"
              name="description"
              rows="4"
              required
            ></textarea>
          </label>
          <label class="flex flex-col gap-2 text-sm font-medium">
            Price
            <input
              class="input-field w-full rounded-lg border border-slate-200 bg-white px-4 py-2 text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-slate-100"
              type="number"
              name="price"
              min="0"
              step="0.01"
              required
            />
          </label>
          <button
            class="w-full rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-400 disabled:cursor-not-allowed disabled:bg-indigo-300"
            type="submit"
            data-default-text="Create Listing"
          >
            Create Listing
          </button>
          <p class="text-sm text-rose-600" id="create-listing-error"></p>
        </form>
      </div>
    </main>

    <div id="footer"></div>

    <script type="module" src="/assets/js/create-listing.js"></script>
    <script type="module" src="/assets/js/ui.js"></script>
  </body>
</html>
