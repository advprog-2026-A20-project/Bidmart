<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Listing - Bidmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div id="navbar"></div>

    <main class="mx-auto flex min-h-screen max-w-5xl flex-col justify-center px-6 py-10">
      <div class="mx-auto w-full max-w-xl">
        <h1 class="text-3xl font-semibold">Create Listing</h1>
        <p class="mt-2 text-sm text-slate-400">Hanya seller yang bisa membuat listing.</p>

        <form class="mt-8 space-y-4" id="create-listing-form">
          <label class="flex flex-col gap-2 text-sm">
            Title
            <input
              class="rounded-lg border border-slate-800 bg-slate-900 px-4 py-2"
              type="text"
              name="title"
              required
            />
          </label>
          <label class="flex flex-col gap-2 text-sm">
            Description
            <textarea
              class="rounded-lg border border-slate-800 bg-slate-900 px-4 py-2"
              name="description"
              rows="4"
              required
            ></textarea>
          </label>
          <label class="flex flex-col gap-2 text-sm">
            Price
            <input
              class="rounded-lg border border-slate-800 bg-slate-900 px-4 py-2"
              type="number"
              name="price"
              min="0"
              step="0.01"
              required
            />
          </label>
          <button class="w-full rounded-lg bg-indigo-500 px-4 py-2 text-sm font-semibold" type="submit">
            Create Listing
          </button>
          <p class="text-sm text-red-400" id="create-listing-error"></p>
        </form>
      </div>
    </main>

    <div id="footer"></div>

    <script type="module" src="/assets/js/create-listing.js"></script>
    <script type="module" src="/assets/js/ui.js"></script>
  </body>
</html>
