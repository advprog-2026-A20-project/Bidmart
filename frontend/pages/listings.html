<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listings - Bidmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div id="navbar"></div>

    <main class="mx-auto flex min-h-screen max-w-6xl flex-col gap-8 px-6 py-10">
      <header class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-semibold">Listings</h1>
          <p class="text-sm text-slate-400">Jelajahi listing terbaru di Bidmart.</p>
        </div>
        <a class="rounded-full bg-indigo-500 px-4 py-2 text-sm font-semibold" href="/pages/create-listing.html" id="create-listing-link">
          Create Listing
        </a>
      </header>

      <section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3" id="listings-container"></section>

      <section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3" id="listings-skeleton">
        <div class="rounded-2xl border border-slate-800 bg-slate-900 p-4">
          <div class="h-4 w-3/5 rounded bg-slate-800"></div>
          <div class="mt-4 h-3 w-2/5 rounded bg-slate-800"></div>
          <div class="mt-3 h-3 w-full rounded bg-slate-800"></div>
          <div class="mt-2 h-3 w-4/5 rounded bg-slate-800"></div>
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900 p-4">
          <div class="h-4 w-2/4 rounded bg-slate-800"></div>
          <div class="mt-4 h-3 w-1/3 rounded bg-slate-800"></div>
          <div class="mt-3 h-3 w-full rounded bg-slate-800"></div>
          <div class="mt-2 h-3 w-3/4 rounded bg-slate-800"></div>
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900 p-4">
          <div class="h-4 w-1/2 rounded bg-slate-800"></div>
          <div class="mt-4 h-3 w-2/5 rounded bg-slate-800"></div>
          <div class="mt-3 h-3 w-full rounded bg-slate-800"></div>
          <div class="mt-2 h-3 w-4/6 rounded bg-slate-800"></div>
        </div>
      </section>

      <div class="hidden" id="listings-empty">
        <p class="rounded-2xl border border-slate-800 bg-slate-900 p-6 text-center text-sm text-slate-400">
          Belum ada listing. Coba lagi nanti.
        </p>
      </div>

      <div class="hidden" id="listings-error">
        <div class="rounded-2xl border border-rose-900/40 bg-rose-950/40 p-6 text-center text-sm text-rose-200">
          <p id="listings-error-message">Gagal memuat listing.</p>
          <button class="mt-4 rounded-full bg-rose-500 px-4 py-2 text-xs font-semibold text-white" id="listings-retry" type="button">
            Retry
          </button>
        </div>
      </div>
    </main>

    <div id="footer"></div>

    <script type="module" src="/assets/js/listings.js"></script>
    <script type="module" src="/assets/js/ui.js"></script>
  </body>
</html>
