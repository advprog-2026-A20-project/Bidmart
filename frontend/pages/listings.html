<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listings - Bidmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header class="border-b border-slate-900">

      <section class="mt-8 grid gap-4 sm:grid-cols-2" id="listings-container"></section>

    <script type="module" src="/assets/js/listings.js"></script>
