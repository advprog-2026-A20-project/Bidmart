spring.datasource.url=jdbc:h2:mem:bidmart;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

JWT_SECRET=local-dev-secret-please-change-32-chars
security.jwt.expiration-seconds=${JWT_EXP_SECONDS:604800}
