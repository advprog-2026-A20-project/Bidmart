spring.application.name=backend
server.port=${PORT:8080}
spring.profiles.default=supabase

spring.jpa.hibernate.ddl-auto=update

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-seconds=${JWT_EXP_SECONDS:604800}

microservices.auction-query.enabled=${AUCTION_QUERY_SERVICE_ENABLED:false}
microservices.auction-query.base-url=${AUCTION_QUERY_SERVICE_BASE_URL:}
microservices.auction-query.connect-timeout-ms=${AUCTION_QUERY_SERVICE_CONNECT_TIMEOUT_MS:500}
microservices.auction-query.read-timeout-ms=${AUCTION_QUERY_SERVICE_READ_TIMEOUT_MS:1500}
microservices.auction-query.fail-open=${AUCTION_QUERY_SERVICE_FAIL_OPEN:true}
microservices.auction-query.rollout-mode=${AUCTION_QUERY_SERVICE_ROLLOUT_MODE:DISABLED}
microservices.auction-query.rollout-percent=${AUCTION_QUERY_SERVICE_ROLLOUT_PERCENT:0}

microservices.listing-query.enabled=${LISTING_QUERY_SERVICE_ENABLED:false}
microservices.listing-query.base-url=${LISTING_QUERY_SERVICE_BASE_URL:}
microservices.listing-query.connect-timeout-ms=${LISTING_QUERY_SERVICE_CONNECT_TIMEOUT_MS:500}
microservices.listing-query.read-timeout-ms=${LISTING_QUERY_SERVICE_READ_TIMEOUT_MS:1500}
microservices.listing-query.fail-open=${LISTING_QUERY_SERVICE_FAIL_OPEN:true}
microservices.listing-query.rollout-mode=${LISTING_QUERY_SERVICE_ROLLOUT_MODE:DISABLED}
microservices.listing-query.rollout-percent=${LISTING_QUERY_SERVICE_ROLLOUT_PERCENT:0}
