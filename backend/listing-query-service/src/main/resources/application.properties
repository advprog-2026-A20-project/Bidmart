server.port=${PORT:8082}
spring.application.name=listing-query-service
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=${LISTING_QUERY_DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bidmart}}
spring.datasource.username=${LISTING_QUERY_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${LISTING_QUERY_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:postgres}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
management.endpoints.web.exposure.include=health
